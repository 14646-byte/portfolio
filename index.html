<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins",sans-serif;
}

body{
    background:linear-gradient(135deg,#ffd6e7,#ffeef5,#fff7fb);
    overflow:hidden;
    height:100vh;
}

/* หัวใจลอย */
.heart{
    position:absolute;
    color:#ff8fb1;
    font-size:20px;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    to{
        transform:translateY(-120px);
        opacity:1;
    }
}

.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:rgba(255,255,255,.5);
    backdrop-filter:blur(12px);
    padding:45px;
    border-radius:30px;
    width:400px;
    text-align:center;
    box-shadow:0 10px 25px rgba(255,150,180,.4);
}

h1{
    color:#ff5f9e;
    margin-bottom:10px;
    font-size:35px;
}

p{
    color:#666;
    margin-bottom:25px;
}

.menu a{
    display:block;
    text-decoration:none;
    background:#ffb6d5;
    color:white;
    margin:12px 0;
    padding:15px;
    border-radius:50px;
    transition:.3s;
    font-size:18px;
}

.menu a:hover{
    background:#ff82b2;
    transform:scale(1.08);
    box-shadow:0 8px 18px rgba(255,120,170,.5);
}

.footer{
    margin-top:25px;
    color:#ff6ea9;
    font-size:14px;
}

.sparkle{
    animation:blink 1.5s infinite;
}

@keyframes blink{
    50%{
        opacity:.3;
    }
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>🌸 My Portfolio 🌸</h1>

<p>Welcome to my cute portfolio ✨</p>

<div class="menu">
<a href="personal.html">👤 ประวัติส่วนตัว</a>

<a href="education.html">🎓 ประวัติการศึกษา</a>

<a href="project.html">💖 ผลงาน</a>

<a href="contact.html">📞 ช่องทางการติดต่อ</a>
</div>

<div class="footer">
<span class="sparkle">✨ Have a Nice Day ✨</span>
</div>

</div>
</div>

<script>
//สร้างหัวใจลอย
for(let i=0;i<25;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💗";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(5+Math.random()*5)+"s";

heart.style.fontSize=(15+Math.random()*20)+"px";

heart.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(heart);

}
</script>

</body>
    </html>
