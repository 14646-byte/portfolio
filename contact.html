<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ช่องทางการติดต่อ</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#ffd6e7,#fff5f8,#ffeaf3);
    min-height:100vh;
    overflow-x:hidden;
}

/* หัวใจลอย */
.heart{
    position:fixed;
    color:#ff8fb1;
    animation:float 8s linear infinite;
    pointer-events:none;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    to{
        transform:translateY(-120px);
        opacity:1;
    }
}

/* เมนู */
nav{
    background:rgba(255,255,255,.65);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:center;
    gap:15px;
    padding:18px;
    position:sticky;
    top:0;
    z-index:999;
}

nav a{
    text-decoration:none;
    color:white;
    background:#ff9fc6;
    padding:10px 18px;
    border-radius:30px;
    transition:.3s;
    font-weight:bold;
}

nav a:hover{
    background:#ff6fa9;
    transform:scale(1.05);
}

/* กล่องข้อมูล */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:50px 20px;
}

.card{
    width:700px;
    background:rgba(255,255,255,.75);
    backdrop-filter:blur(12px);
    border-radius:30px;
    padding:40px;
    text-align:center;
    box-shadow:0 10px 25px rgba(255,170,200,.4);
}

h1{
    color:#ff5d98;
    margin-bottom:30px;
}

.contact{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.contact a{
    text-decoration:none;
    background:#fff7fb;
    color:#555;
    padding:18px;
    border-radius:20px;
    font-size:20px;
    transition:.3s;
    box-shadow:0 5px 12px rgba(255,170,200,.25);
}

.contact a:hover{
    background:#ff9fc6;
    color:white;
    transform:translateY(-5px) scale(1.03);
}

.footer{
    margin-top:30px;
    color:#ff6fa9;
    font-size:16px;
}
</style>

</head>
<body>

<nav>
    <a href="index.html">🏠 หน้าแรก</a>
    <a href="personal.html">👤 ประวัติส่วนตัว</a>
    <a href="education.html">🎓 ประวัติการศึกษา</a>
    <a href="project.html">💖 ผลงาน</a>
    <a href="contact.html">📞 ติดต่อ</a>
</nav>

<div class="container">

<div class="card">

<h1>📞 ช่องทางการติดต่อ</h1>

<div class="contact">

📱 โทรศัพท์ : 065-445-9832
</a>

📧 Email : sutidaaketkeaw@email.com
</a>

💙 Facebook : fern sutida
</a>

📸 Instagram : fern._n_
</a>

</div>

<div class="footer">
💗 Thank you for visiting my Portfolio 💗
</div>

</div>

</div>

<script>
// หัวใจลอย
for(let i=0;i<30;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💗";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(15+Math.random()*20)+"px";
    heart.style.animationDuration=(5+Math.random()*5)+"s";
    heart.style.animationDelay=Math.random()*5+"s";
    document.body.appendChild(heart);
}
</script>

</body>
</html>
