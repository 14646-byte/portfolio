<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ประวัติการศึกษา</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#ffd6e7,#fff5f8,#ffe9f2);
    min-height:100vh;
    overflow-x:hidden;
}

/* หัวใจลอย */
.heart{
    position:fixed;
    color:#ff8fb1;
    animation:float 8s linear infinite;
    pointer-events:none;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    to{
        transform:translateY(-120px);
        opacity:1;
    }
}

/* เมนู */
nav{
    background:rgba(255,255,255,.65);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:center;
    gap:15px;
    padding:18px;
    position:sticky;
    top:0;
}

nav a{
    text-decoration:none;
    color:white;
    background:#ff9fc6;
    padding:10px 18px;
    border-radius:30px;
    transition:.3s;
    font-weight:bold;
}

nav a:hover{
    background:#ff6fa9;
    transform:scale(1.05);
}

/* กล่องหลัก */
.container{
    display:flex;
    justify-content:center;
    padding:40px;
}

.card{
    width:850px;
    background:rgba(255,255,255,.7);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:35px;
    box-shadow:0 10px 25px rgba(255,150,180,.4);
}

h1{
    text-align:center;
    color:#ff5d98;
    margin-bottom:30px;
}

/* Timeline */
.timeline{
    position:relative;
    margin-left:20px;
    border-left:4px solid #ffb6d5;
}

.item{
    position:relative;
    margin:30px 0 30px 30px;
    background:#fff7fb;
    padding:20px;
    border-radius:18px;
    box-shadow:0 5px 12px rgba(255,170,200,.3);
}

.item::before{
    content:"🎀";
    position:absolute;
    left:-48px;
    top:18px;
    font-size:24px;
}

.item h2{
    color:#ff5d98;
    margin-bottom:8px;
}

.item p{
    color:#666;
    line-height:1.7;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#ff6fa9;
}
</style>
</head>

<body>

<nav>
    <a href="index.html">🏠 หน้าแรก</a>
    <a href="personal.html">👤 ประวัติส่วนตัว</a>
    <a href="education.html">🎓 ประวัติการศึกษา</a>
    <a href="project.html">💖 ผลงาน</a>
    <a href="contact.html">📞 ติดต่อ</a>
</nav>

<div class="container">

<div class="card">

<h1>🎓 ประวัติการศึกษา</h1>

<div class="timeline">

<div class="item">
<h2>ระดับอนุบาล</h2>
<p>
โรงเรียน : ชุมชนวัดหนองตำลึง<br>
</p>
</div>

<div class="item">
<h2>ระดับประถมศึกษา</h2>
<p>
โรงเรียน : ชุมชนวัดหนองตำลึง<br>
</p>
</div>

<div class="item">
<h2>ระดับมัธยมศึกษาตอนต้น</h2>
<p>
โรงเรียน : พานทอง<br>
</p>
</div>

<div class="item">
<h2>ระดับมัธยมศึกษาตอนปลาย</h2>
<p>
โรงเรียน : พานทอง
</p>
</div>

</div>

<div class="footer">
🌸 Learning Today, Leading Tomorrow 🌸
</div>

</div>

</div>

<script>
// หัวใจลอย
for(let i=0;i<30;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💗";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(15+Math.random()*20)+"px";
heart.style.animationDuration=(5+Math.random()*5)+"s";
heart.style.animationDelay=Math.random()*5+"s";
document.body.appendChild(heart);
}
</script>

</body>
  </html>
