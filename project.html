<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ผลงาน</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#ffd6e7,#fff5f8,#ffeaf3);
    min-height:100vh;
    overflow-x:hidden;
}

/* หัวใจลอย */
.heart{
    position:fixed;
    color:#ff8fb1;
    animation:float 8s linear infinite;
    pointer-events:none;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    to{
        transform:translateY(-120px);
        opacity:1;
    }
}

/* เมนู */
nav{
    background:rgba(255,255,255,.65);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:center;
    gap:15px;
    padding:18px;
    position:sticky;
    top:0;
    z-index:999;
}

nav a{
    text-decoration:none;
    color:white;
    background:#ff9fc6;
    padding:10px 18px;
    border-radius:30px;
    transition:.3s;
    font-weight:bold;
}

nav a:hover{
    background:#ff6fa9;
    transform:scale(1.05);
}

/* เนื้อหา */
.container{
    width:90%;
    max-width:1200px;
    margin:40px auto;
}

h1{
    text-align:center;
    color:#ff5d98;
    margin-bottom:35px;
}

/* การ์ดผลงาน */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.card{
    background:rgba(255,255,255,.7);
    backdrop-filter:blur(10px);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 20px rgba(255,170,200,.35);
    transition:.35s;
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.card-content h2{
    color:#ff5d98;
    margin-bottom:10px;
}

.card-content p{
    color:#666;
    line-height:1.6;
}

.footer{
    text-align:center;
    margin:40px 0;
    color:#ff6fa9;
}
</style>

</head>
<body>

<nav>
    <a href="index.html">🏠 หน้าแรก</a>
    <a href="personal.html">👤 ประวัติส่วนตัว</a>
    <a href="education.html">🎓 ประวัติการศึกษา</a>
    <a href="project.html">💖 ผลงาน</a>
    <a href="contact.html">📞 ติดต่อ</a>
</nav>

<div class="container">

<h1>💖 ผลงาน (Portfolio)</h1>

<div class="grid">

<div class="card">
<img src="work1.jpg" alt="ผลงานที่ 1">
<div class="card-content">
<h2>🏆 ผลงานชิ้นที่ 1</h2>
<p>certificate of completion Thai mooc</p>
</div>
</div>

<div class="card">
<img src="images/IMG_20260720_190423.jpg" alt="ผลงานที่ 2">
<div class="card-content">
<h2>🏆 ผลงานชิ้นที่ 2</h2>
<p>ได้รับรางวัลคนดีศรีพานทอง</p>
</div>
</div>

</div>

<div class="footer">
🌸 Every Achievement Begins with the Decision to Try 🌸
</div>

</div>

<script>
// หัวใจลอย
for(let i=0;i<30;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💗";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(15+Math.random()*20)+"px";
    heart.style.animationDuration=(5+Math.random()*5)+"s";
    heart.style.animationDelay=Math.random()*5+"s";
    document.body.appendChild(heart);
}
</script>

</body>
  </html>
